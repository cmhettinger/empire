services:
  pgbouncer:
    image: edoburu/pgbouncer:${PGBOUNCER_VERSION:-latest}
    container_name: ${EMPIRE_PGBOUNCER_CONTAINER:-empire-pgbouncer}
    restart: unless-stopped

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}

      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-100}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}

    ports:
      - "${PGBOUNCER_HOST_PORT:-6432}:5432"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - empire-net