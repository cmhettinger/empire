youtube:
  name: daily_youtube_scraper
  version: 1
  lookback_hours: 26
  max_results_per_query: 10

  filters:
    exclude_shorts: false
    min_duration_minutes: 2
    language: en

  thumbnail_preference:
    - maxres
    - standard
    - high
    - medium
    - default

  topic_sections:
    - key: home_automation
      name: Home Automation
      topics:
        - key: home_assistant
          name: Home Assistant
          queries:
            - "home assistant"
            - "home assistant automation"

        - key: esphome
          name: ESPHome
          queries:
            - "esphome"

    - key: retro_cartoons
      name: Retro Cartoons
      topics:
        - key: cartoons_80s
          name: "80s Cartoons"
          queries:
            - "80s cartoons"

        - key: cartoons_90s
          name: "90s Cartoons"
          queries:
            - "90s cartoons"

  followed_channels:
    - channel_name: All-In Podcast
      channel_id: UCESLZhusAkFfsNsApnjF_Cg
      handle: "@allin"

    - channel_name: The Randall Carlson
      channel_id: UCAPciy143ZBXBrFpCVPnWDg
      handle: "@TheRandallCarlson"

    - channel_name: Graham Hancock Official Channel
      channel_id: UCk_foUwmaHeFhmAZMnEHQsw
      handle: "@grahamhancock"
