        output_file: snowfall_forecast_day1.gif
        content_type: image/gif
        url: https://www.wpc.ncep.noaa.gov/pwpf_24hr/prb_24hsnow_ge01_2026060912f024.gif

      ice_forecast:
        enabled: true
        provider: wpc
        output_file: ice_forecast.gif
        content_type: image/gif
        url: https://www.wpc.ncep.noaa.gov/pwpf_24hr/prb_24hicez_ge.01_2026060912f072.gif

      # ============================================================
      # AIR QUALITY / ENVIRONMENTAL
      # Source: NOAA/EPA
      # ============================================================

      uv_index:
        enabled: true
        provider: noaa
        output_file: uv_index.gif
        content_type: image/gif
        url: https://www.cpc.ncep.noaa.gov/products/stratosphere/uv_index/gif_files/uvi_usa_f1_wmo.gif

      current_heat_risk_ashburn_va:
        enabled: true
        provider: noaa
        output_file: current_heat_index.png
        content_type: image/png
