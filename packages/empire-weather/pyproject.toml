[tool.poetry]
name = "empire-weather"
version = "0.1.0"
description = "Reusable weather data collection utilities for Empire."
readme = "README.md"
authors = ["Empire"]
packages = [{ include = "empire_weather", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
empire-core = { path = "../empire-core" }
PyYAML = ">=6.0"
requests = ">=2.31"
curl-cffi = ">=0.15.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../empire-core/src"]
