[project]
name = "empire-mail"
version = "0.1.0"
description = "Reusable SMTP email utilities for Empire."
readme = "README.md"
requires-python = ">=3.11,<4.0"
authors = [{ name = "Empire" }]
dependencies = []

[tool.poetry]
packages = [{ include = "empire_mail", from = "src" }]

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
