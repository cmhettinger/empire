[tool.poetry]
name = "empire-reports"
version = "0.1.0"
description = "Reusable report rendering primitives for Empire."
readme = "README.md"
authors = ["Empire"]
packages = [{ include = "empire_reports", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
reportlab = ">=4.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
