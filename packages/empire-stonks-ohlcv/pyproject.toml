[tool.poetry]
name = "empire-stonks-ohlcv"
version = "0.1.0"
description = "Reusable provider-native OHLCV ingestion utilities for Empire stonks."
readme = "README.md"
authors = ["Empire"]
packages = [{ include = "empire_stonks_ohlcv", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
empire-core = { path = "../empire-core" }

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../empire-core/src"]
